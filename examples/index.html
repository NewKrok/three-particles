<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three Particles — Examples</title>
  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V3NGXP6M8X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-V3NGXP6M8X');
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 40px 20px 20px;
      border-bottom: 1px solid #222;
    }
    header h1 { font-size: 2rem; color: #fff; margin-bottom: 8px; }
    header p { color: #888; font-size: 1.1rem; }
    header a { color: #4fc3f7; text-decoration: none; }
    header a:hover { text-decoration: underline; }
    .links { margin-top: 12px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .links a {
      color: #4fc3f7; text-decoration: none; font-size: 0.9rem;
      padding: 4px 12px; border: 1px solid #333; border-radius: 4px;
    }
    .links a:hover { background: #1a1a2e; border-color: #4fc3f7; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
    }
    .card:hover { border-color: #4fc3f7; transform: translateY(-2px); }
    .card.active { border-color: #4fc3f7; }
    .card-canvas-wrapper {
      position: relative;
      width: 100%;
      height: 220px;
      background-color: #1a1a1a;
      background-image:
        linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%),
        linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%);
      background-size: 16px 16px;
      background-position: 0 0, 8px 8px;
    }
    .card canvas { width: 100%; height: 100%; display: block; }
    .card .preview-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      position: absolute; top: 0; left: 0;
    }
    .card .preview-placeholder {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #0a0a14 100%);
    }
    .play-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.25);
      opacity: 0; transition: opacity 0.2s;
    }
    .card:hover .play-overlay { opacity: 1; }
    .stop-hint {
      position: absolute; top: 8px; right: 8px;
      display: flex; align-items: center;
      padding: 4px 10px; border-radius: 4px;
      background: rgba(0,0,0,0.6); color: #aaa; font-size: 0.75rem;
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .card.active:hover .stop-hint { opacity: 1; }
    .card-info { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .card-info h3 { font-size: 1.1rem; color: #fff; margin-bottom: 4px; }
    .card-info p { font-size: 0.85rem; color: #888; line-height: 1.4; flex: 1; }
    .card-info .tag {
      display: inline-block; margin-top: 8px; padding: 2px 8px;
      background: #1a1a2e; color: #4fc3f7; border-radius: 3px; font-size: 0.75rem;
    }
    .card-info .card-actions {
      display: flex; align-items: center; justify-content: space-between; margin-top: 10px;
    }
    .card-info .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .card-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border: 1px solid #333; border-radius: 4px;
      background: transparent; color: #4fc3f7;
      cursor: pointer; transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .icon-btn:hover { background: #1a1a2e; border-color: #4fc3f7; }
    .icon-btn svg { width: 16px; height: 16px; }
    .icon-btn.copied { color: #66bb6a; border-color: #66bb6a; }
    .version-switcher {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 12px; font-size: 0.85rem; color: #888;
    }
    .version-switcher select {
      background: #1a1a2e; color: #4fc3f7; border: 1px solid #333;
      border-radius: 4px; padding: 4px 8px; font-size: 0.85rem;
      cursor: pointer; outline: none;
    }
    .version-switcher select:hover { border-color: #4fc3f7; }
    .version-switcher .version-loading {
      color: #666; font-style: italic;
    }

    /* Benchmark modal */
    .bench-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
    }
    .bench-overlay.open { display: flex; }
    .bench-modal {
      background: #141414; border: 1px solid #333; border-radius: 12px;
      width: 90vw; max-width: 800px; max-height: 90vh; overflow-y: auto;
      padding: 28px 32px; position: relative;
    }
    .bench-modal h2 { color: #fff; font-size: 1.3rem; margin-bottom: 16px; }
    .bench-close {
      position: absolute; top: 12px; right: 16px;
      background: none; border: none; color: #888; font-size: 1.5rem;
      cursor: pointer; line-height: 1;
    }
    .bench-close:hover { color: #fff; }
    .bench-versions {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
    }
    .bench-versions label {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 10px; border: 1px solid #333; border-radius: 4px;
      font-size: 0.85rem; color: #ccc; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .bench-versions label:hover { border-color: #4fc3f7; }
    .bench-versions input:checked + span { color: #4fc3f7; }
    .bench-versions input { accent-color: #4fc3f7; }
    .bench-actions { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
    .bench-btn {
      padding: 8px 20px; border-radius: 6px; border: 1px solid #4fc3f7;
      background: transparent; color: #4fc3f7; font-size: 0.9rem;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .bench-btn:hover { background: #4fc3f7; color: #0a0a0a; }
    .bench-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .bench-btn:disabled:hover { background: transparent; color: #4fc3f7; }
    .bench-btn.abort { border-color: #ef5350; color: #ef5350; }
    .bench-btn.abort:hover { background: #ef5350; color: #fff; }
    .bench-status { color: #888; font-size: 0.85rem; flex: 1; }
    .bench-chart-wrap {
      width: 100%; height: 300px; border: 1px solid #222; border-radius: 8px;
      overflow: hidden; background: #111;
    }
    .bench-chart-wrap canvas { display: block; }
    .bench-iframe-host {
      position: absolute; width: 1px; height: 1px; overflow: hidden;
      opacity: 0; pointer-events: none;
    }
    .bench-select-actions { display: flex; gap: 8px; margin-bottom: 10px; }
    .bench-select-btn {
      background: none; border: none; color: #4fc3f7; font-size: 0.8rem;
      cursor: pointer; text-decoration: underline; padding: 0;
    }
    .bench-select-btn:hover { color: #81d4fa; }
    .bench-metric-tabs {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
    }
    .bench-metric-tab {
      padding: 4px 12px; border-radius: 4px; border: 1px solid #333;
      background: transparent; color: #888; font-size: 0.8rem;
      cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .bench-metric-tab:hover { border-color: #4fc3f7; color: #ccc; }
    .bench-metric-tab.active { border-color: #4fc3f7; color: #4fc3f7; background: #1a1a2e; }

    /* Error overlay */
    .error-overlay {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      max-height: 40vh; overflow-y: auto; z-index: 10000;
      background: #1a0000; border-top: 2px solid #ef5350;
      font-family: monospace; font-size: 0.82rem; color: #ffcdd2;
    }
    .error-overlay.visible { display: block; }
    .error-header {
      position: sticky; top: 0; background: #2c0b0b;
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; border-bottom: 1px solid #4e1a1a;
    }
    .error-header span { font-weight: bold; color: #ef5350; }
    .error-header-btns { display: flex; gap: 8px; }
    .error-header-btns button {
      background: none; border: 1px solid #ef5350; color: #ef5350;
      padding: 3px 10px; border-radius: 4px; font-size: 0.78rem;
      cursor: pointer; font-family: inherit;
    }
    .error-header-btns button:hover { background: #ef5350; color: #fff; }
    .error-list { padding: 10px 14px; }
    .error-entry { padding: 6px 0; border-bottom: 1px solid #3a1111; white-space: pre-wrap; word-break: break-all; }
    .error-entry:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <header>
    <h1>@newkrok/three-particles</h1>
    <p>Interactive examples for the Three.js particle system library</p>
    <div class="links">
      <a href="https://github.com/NewKrok/three-particles" onclick="gtag('event','navigation',{event_category:'header',event_label:'github'})">GitHub</a>
      <a href="https://www.npmjs.com/package/@newkrok/three-particles" onclick="gtag('event','navigation',{event_category:'header',event_label:'npm'})">npm</a>
      <a href="https://newkrok.github.io/three-particles/api/" onclick="gtag('event','navigation',{event_category:'header',event_label:'api_docs'})">API Docs</a>
      <a href="https://newkrok.com/three-particles-editor/index.html" onclick="gtag('event','navigation',{event_category:'header',event_label:'visual_editor'})">Visual Editor</a>
      <a href="#" id="bench-open-btn" onclick="event.preventDefault()">Benchmark</a>
    </div>
    <div class="version-switcher">
      <label for="version-select">Version:</label>
      <select id="version-select" disabled>
        <option>loading...</option>
      </select>
    </div>
  </header>

  <!-- Benchmark modal -->
  <div class="bench-overlay" id="bench-overlay">
    <div class="bench-modal">
      <button class="bench-close" id="bench-close">&times;</button>
      <h2>Performance Benchmark</h2>
      <p style="color:#888;font-size:0.85rem;margin-bottom:14px;">
        Compare FPS across versions. Each version runs a stress test with 5 000 particles and multiple active modifiers.
      </p>
      <div class="bench-select-actions">
        <button class="bench-select-btn" id="bench-select-all">Select all</button>
        <button class="bench-select-btn" id="bench-select-none">Deselect all</button>
      </div>
      <div class="bench-versions" id="bench-versions">
        <!-- populated by JS -->
      </div>
      <div class="bench-actions">
        <button class="bench-btn" id="bench-run">Run benchmark</button>
        <button class="bench-btn abort" id="bench-abort" disabled>Abort</button>
        <span class="bench-status" id="bench-status"></span>
      </div>
      <div class="bench-metric-tabs" id="bench-metric-tabs">
        <!-- populated by JS -->
      </div>
      <div class="bench-chart-wrap" id="bench-chart-wrap">
        <canvas id="bench-chart"></canvas>
      </div>
      <div class="bench-iframe-host" id="bench-iframe-host"></div>
    </div>
  </div>

  <div class="grid" id="examples-grid"></div>

  <!-- Error overlay for mobile debugging -->
  <div class="error-overlay" id="error-overlay">
    <div class="error-header">
      <span id="error-count">0 error(s)</span>
      <div class="error-header-btns">
        <button id="error-copy-btn">Copy errors</button>
        <button id="error-close-btn">Close</button>
      </div>
    </div>
    <div class="error-list" id="error-list"></div>
  </div>
  <script>
  (function(){
    var overlay = document.getElementById('error-overlay');
    var list = document.getElementById('error-list');
    var countEl = document.getElementById('error-count');
    var errors = [];

    function addError(msg) {
      errors.push(msg);
      var entry = document.createElement('div');
      entry.className = 'error-entry';
      entry.textContent = msg;
      list.appendChild(entry);
      countEl.textContent = errors.length + ' error(s)';
      overlay.classList.add('visible');
    }

    window.addEventListener('error', function(e) {
      var msg = (e.message || 'Unknown error');
      if (e.filename) msg += '\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno;
      if (e.error && e.error.stack) msg += '\n' + e.error.stack;
      addError(msg);
    });

    window.addEventListener('unhandledrejection', function(e) {
      var msg = 'Unhandled Promise Rejection: ';
      if (e.reason instanceof Error) {
        msg += e.reason.message;
        if (e.reason.stack) msg += '\n' + e.reason.stack;
      } else {
        msg += String(e.reason);
      }
      addError(msg);
    });

    document.getElementById('error-copy-btn').addEventListener('click', function() {
      var text = errors.join('\n\n---\n\n');
      navigator.clipboard.writeText(text).then(function() {
        var btn = document.getElementById('error-copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(function(){ btn.textContent = 'Copy errors'; }, 1500);
      });
    });

    document.getElementById('error-close-btn').addEventListener('click', function() {
      overlay.classList.remove('visible');
    });
  })();
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
      "three/": "https://cdn.jsdelivr.net/npm/three@0.182.0/",
      "THREE": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
