<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Generate Previews</title>
  <style>
    body { background: #000; color: #fff; font-family: monospace; padding: 20px; }
    #status { margin-bottom: 20px; font-size: 1.2rem; }
    #container { display: flex; flex-wrap: wrap; gap: 8px; }
    .preview-slot { position: relative; }
    .preview-slot canvas { display: block; width: 320px; height: 220px; background: #111; }
    .preview-slot .label { font-size: 11px; color: #888; margin-top: 2px; }
    #download-all { margin-top: 20px; padding: 12px 24px; font-size: 1rem; cursor: pointer; background: #4fc3f7; border: none; border-radius: 4px; display: none; }
  </style>
</head>
<body>
  <div id="status">Initializing...</div>
  <button id="download-all">Download All Previews</button>
  <div id="container"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
      "three/": "https://cdn.jsdelivr.net/npm/three@0.182.0/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { createParticleSystem } from "./three-particles.esm.js";

    const TEXTURE_MAP = {
      FLAME: "textures/flame.webp",
      CLOUD: "textures/cloud.webp",
      SNOWFLAKE: "textures/snowflake.webp",
      GRADIENT_POINT: "textures/gradient-point.webp",
      VORTEX: "textures/vortex.webp",
      STAR: "textures/star.webp",
      POINT: "textures/point.webp",
      PLUS_TOON: "textures/plus-toon.webp",
      SNOWFLAKE_DETAILED: "textures/snowflake-detailed.webp",
      SQUARE: "textures/square.webp",
      CIRCLE: "textures/circle.webp",
      LEAF_TOON: "textures/leaf-toon.webp",
      SKULL: "textures/skull.webp",
      ROCKS: "textures/rocks.webp",
      STARBURST: "textures/starbust.webp",
      SOFT_SMOKE: "textures/soft-smoke.webp",
      BUBBLES: "textures/bubbles.webp",
      FEATHER: "textures/feather.webp",
    };

    const textureLoader = new THREE.TextureLoader();

    function loadTextureAsync(path) {
      return new Promise((resolve, reject) => {
        textureLoader.load(path, resolve, undefined, reject);
      });
    }

    function resolveBlending(blending) {
      if (typeof blending === "number") return blending;
      if (blending === "THREE.AdditiveBlending") return THREE.AdditiveBlending;
      return THREE.NormalBlending;
    }

    const MESH_GEOMETRIES = {
      BOX: () => new THREE.BoxGeometry(1, 1, 1),
      SPHERE: () => new THREE.SphereGeometry(0.5, 12, 8),
      ICOSAHEDRON: () => new THREE.IcosahedronGeometry(0.5, 0),
      TORUS: () => new THREE.TorusGeometry(0.4, 0.15, 8, 24),
      CONE: () => new THREE.ConeGeometry(0.4, 1, 8),
      OCTAHEDRON: () => new THREE.OctahedronGeometry(0.5, 0),
      DODECAHEDRON: () => new THREE.DodecahedronGeometry(0.5, 0),
      TETRAHEDRON: () => new THREE.TetrahedronGeometry(0.6, 0),
      TORUS_KNOT: () => new THREE.TorusKnotGeometry(0.3, 0.1, 32, 8),
      CYLINDER: () => new THREE.CylinderGeometry(0.3, 0.3, 1, 8),
    };

    const { examples } = await import("./examples-data.js");

    const status = document.getElementById("status");
    const container = document.getElementById("container");
    const downloadBtn = document.getElementById("download-all");
    const results = [];

    // Check which previews already exist
    const missing = [];
    for (const example of examples) {
      try {
        const resp = await fetch(`previews/${example.id}.webp`, { method: "HEAD" });
        if (!resp.ok) missing.push(example);
      } catch {
        missing.push(example);
      }
    }

    if (missing.length === 0) {
      status.textContent = "All previews already exist! Nothing to generate.";
    } else {

    status.textContent = `${missing.length} missing preview(s) out of ${examples.length}. Generating...`;

    for (let i = 0; i < missing.length; i++) {
      const example = missing[i];
      status.textContent = `[${i + 1}/${missing.length}] Rendering: ${example.title}...`;

      // Create a canvas for this demo
      const slot = document.createElement("div");
      slot.className = "preview-slot";
      const canvas = document.createElement("canvas");
      canvas.width = 640;
      canvas.height = 440;
      canvas.style.width = "320px";
      canvas.style.height = "220px";
      slot.appendChild(canvas);
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = example.id;
      slot.appendChild(label);
      container.appendChild(slot);

      // Load texture
      let tex = null;
      if (example.textureId && TEXTURE_MAP[example.textureId]) {
        try {
          tex = await loadTextureAsync(TEXTURE_MAP[example.textureId]);
          tex.flipY = false;
        } catch (e) {
          console.warn(`Texture load failed for ${example.textureId}`, e);
        }
      }

      // Prepare config
      const config = JSON.parse(JSON.stringify(example.config));
      delete config._editorData;
      if (config.renderer?.blending) {
        config.renderer.blending = resolveBlending(config.renderer.blending);
      }
      if (tex) config.map = tex;
      // Attach mesh geometry for MESH renderer examples
      if (example.meshType && MESH_GEOMETRIES[example.meshType]) {
        if (!config.renderer) config.renderer = {};
        config.renderer.mesh = { geometry: MESH_GEOMETRIES[example.meshType]() };
      }
      if (config.subEmitters) {
        for (const sub of config.subEmitters) {
          if (sub.config?.renderer?.blending) {
            sub.config.renderer.blending = resolveBlending(sub.config.renderer.blending);
          }
          if (sub.textureId && TEXTURE_MAP[sub.textureId]) {
            try {
              const subTex = await loadTextureAsync(TEXTURE_MAP[sub.textureId]);
              subTex.flipY = false;
              sub.config.map = subTex;
            } catch (e) {
              console.warn(`Sub-emitter texture load failed for ${sub.textureId}`, e);
            }
            delete sub.textureId;
          }
        }
      }

      // Create renderer + scene
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: true,
        preserveDrawingBuffer: true,
      });
      renderer.setSize(640, 440);
      renderer.setPixelRatio(1);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, 640 / 440, 1, 100);
      camera.position.set(0, 0, 15);
      camera.lookAt(0, 0, 0);

      const system = createParticleSystem(config);
      scene.add(system.instance);

      // Animate for 2 seconds using requestAnimationFrame
      await new Promise((resolve) => {
        const startTime = performance.now();
        const duration = 2000; // 2 seconds
        let lastTime = startTime;

        function frame(now) {
          const elapsed = (now - startTime) / 1000;
          const delta = (now - lastTime) / 1000;
          lastTime = now;

          system.update({ now: Date.now(), delta, elapsed });
          renderer.render(scene, camera);

          if (now - startTime < duration) {
            requestAnimationFrame(frame);
          } else {
            resolve();
          }
        }
        requestAnimationFrame(frame);
      });

      // Screenshot
      const dataUrl = canvas.toDataURL("image/webp", 0.85);
      results.push({ id: example.id, dataUrl });

      // Cleanup
      system.dispose();
      renderer.dispose();
      renderer.forceContextLoss();

      // Small delay to let browser reclaim context
      await new Promise((r) => setTimeout(r, 100));
    }

    status.textContent = `Done! ${results.length} previews generated. Click button to download.`;
    downloadBtn.style.display = "inline-block";
    } // end else (missing.length > 0)

    downloadBtn.addEventListener("click", async () => {
      status.textContent = "Building ZIP...";
      downloadBtn.disabled = true;

      // Minimal ZIP builder (no dependencies)
      const files = [];
      for (const { id, dataUrl } of results) {
        const resp = await fetch(dataUrl);
        const blob = await resp.blob();
        const buf = new Uint8Array(await blob.arrayBuffer());
        files.push({ name: `previews/${id}.webp`, data: buf });
      }

      const zip = buildZip(files);
      const blob = new Blob([zip], { type: "application/zip" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "previews.zip";
      a.click();
      URL.revokeObjectURL(a.href);

      status.textContent = `Done! previews.zip downloaded (${results.length} files).`;
      downloadBtn.disabled = false;
    });

    // Minimal ZIP (store, no compression — keeps it simple & dependency-free)
    function buildZip(files) {
      const centralDir = [];
      const localParts = [];
      let offset = 0;

      for (const file of files) {
        const nameBytes = new TextEncoder().encode(file.name);
        // Local file header
        const local = new Uint8Array(30 + nameBytes.length + file.data.length);
        const lv = new DataView(local.buffer);
        lv.setUint32(0, 0x04034b50, true);  // signature
        lv.setUint16(4, 20, true);           // version needed
        lv.setUint16(6, 0, true);            // flags
        lv.setUint16(8, 0, true);            // compression (store)
        lv.setUint16(10, 0, true);           // mod time
        lv.setUint16(12, 0, true);           // mod date
        lv.setUint32(14, crc32(file.data), true);
        lv.setUint32(18, file.data.length, true); // compressed
        lv.setUint32(22, file.data.length, true); // uncompressed
        lv.setUint16(26, nameBytes.length, true);
        lv.setUint16(28, 0, true);           // extra length
        local.set(nameBytes, 30);
        local.set(file.data, 30 + nameBytes.length);
        localParts.push(local);

        // Central directory entry
        const cd = new Uint8Array(46 + nameBytes.length);
        const cv = new DataView(cd.buffer);
        cv.setUint32(0, 0x02014b50, true);
        cv.setUint16(4, 20, true);
        cv.setUint16(6, 20, true);
        cv.setUint16(8, 0, true);
        cv.setUint16(10, 0, true);
        cv.setUint16(12, 0, true);
        cv.setUint16(14, 0, true);
        cv.setUint32(16, crc32(file.data), true);
        cv.setUint32(20, file.data.length, true);
        cv.setUint32(24, file.data.length, true);
        cv.setUint16(28, nameBytes.length, true);
        cv.setUint16(30, 0, true);
        cv.setUint16(32, 0, true);
        cv.setUint16(34, 0, true);
        cv.setUint16(36, 0, true);
        cv.setUint32(38, 0x20, true);        // external attrs
        cv.setUint32(42, offset, true);       // local header offset
        cd.set(nameBytes, 46);
        centralDir.push(cd);

        offset += local.length;
      }

      const cdSize = centralDir.reduce((s, c) => s + c.length, 0);
      const eocd = new Uint8Array(22);
      const ev = new DataView(eocd.buffer);
      ev.setUint32(0, 0x06054b50, true);
      ev.setUint16(4, 0, true);
      ev.setUint16(6, 0, true);
      ev.setUint16(8, files.length, true);
      ev.setUint16(10, files.length, true);
      ev.setUint32(12, cdSize, true);
      ev.setUint32(16, offset, true);
      ev.setUint16(20, 0, true);

      const total = offset + cdSize + 22;
      const out = new Uint8Array(total);
      let pos = 0;
      for (const lp of localParts) { out.set(lp, pos); pos += lp.length; }
      for (const cd of centralDir) { out.set(cd, pos); pos += cd.length; }
      out.set(eocd, pos);
      return out;
    }

    function crc32(data) {
      let crc = 0xFFFFFFFF;
      for (let i = 0; i < data.length; i++) {
        crc ^= data[i];
        for (let j = 0; j < 8; j++) {
          crc = (crc >>> 1) ^ (crc & 1 ? 0xEDB88320 : 0);
        }
      }
      return (crc ^ 0xFFFFFFFF) >>> 0;
    }
  </script>
</body>
</html>
