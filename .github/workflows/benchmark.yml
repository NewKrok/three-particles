name: Benchmark

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run benchmarks
        run: node --experimental-vm-modules benchmarks/run.js --json > benchmark-results.json

      - name: Display results
        run: node --experimental-vm-modules benchmarks/run.js

      # On master push: save as baseline
      - name: Save baseline
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: benchmark-results.json
          key: benchmark-baseline-${{ github.sha }}

      # On PR: compare against master baseline
      - name: Restore baseline
        if: github.event_name == 'pull_request'
        id: restore-baseline
        uses: actions/cache/restore@v4
        with:
          path: benchmark-baseline.json
          key: benchmark-baseline-
          restore-keys: benchmark-baseline-

      - name: Compare with baseline
        if: github.event_name == 'pull_request' && steps.restore-baseline.outputs.cache-hit == 'true'
        run: |
          node --experimental-vm-modules benchmarks/run.js --compare benchmark-baseline.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 90
