name: Deploy Pages

on:
  push:
    branches:
      - master

permissions:
  pages: write
  contents: read
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation & Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate TypeDoc
        run: npx typedoc

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Copy examples to docs
        run: |
          cp -r examples/ docs/examples/ 2>/dev/null || true
          cp llms.txt docs/llms.txt 2>/dev/null || true
          cp llms-full.txt docs/llms-full.txt 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
